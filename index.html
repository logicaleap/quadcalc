        <h1>QuadCalc — FPV Drone Build Planner</h1>
        <p>QuadCalc is a free browser-based tool for planning FPV drone builds. Choose from over 1,100 real components — frames, motors, propellers, batteries, flight controllers, ESCs, VTX, cameras, receivers, transmitters, goggles, and antennas — and QuadCalc checks if they're all compatible.</p>
        <h2>Features</h2>
        <ul>
          <li>1,100+ real FPV components with accurate specs and pricing</li>
          <li>Automatic compatibility checking — frame size vs props, video system matching (Analog, DJI, HDZero, Walksnail), radio protocol matching (ELRS, Crossfire, FrSky), battery voltage validation, mount pattern verification</li>
          <li>Real-time build stats — total cost, weight, thrust-to-weight ratio, and estimated flight time</li>
          <li>Starter build templates — Budget 5" Freestyle, Premium 5" HD, 3" Cinewhoop, 7" Long Range, Tiny Whoop</li>
          <li>AI assistant that understands your build and answers FPV questions</li>
          <li>Import components from any FPV store URL</li>
          <li>Save, load, export, and share builds</li>
          <li>Works on desktop and mobile</li>
        </ul>
        <h2>Supported Component Categories</h2>
        <p>Frames (5", 3", 7", 10", Tiny Whoop) · Motors (0802-2812) · Propellers · LiPo Batteries (1S-6S) · Flight Controllers (F405, F722, H743, AIO) · ESCs (BLHeli_S, BLHeli_32, AM32) · Video Transmitters (Analog, DJI O3/O4, HDZero, Walksnail Avatar) · FPV Cameras · Receivers (ELRS, Crossfire, FrSky, FlySky) · Transmitters (RadioMaster, TBS) · Goggles · VTX Antennas · RX Antennas · Accessories</p>
        <p>QuadCalc requires JavaScript to run. Please enable JavaScript in your browser.</p>
